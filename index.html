<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 200%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 0.8s ease-in-out;
}

h1 {
    margin-bottom: 10px;
}

p {
    color: gray;
    margin-bottom: 20px;
}

select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 15px;
}

select:focus {
    outline: none;
    border-color: #667eea;
}

button {
    background: #667eea;
    color: white;
    border: none;
    margin-top: 20px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
    transform: translateY(-2px) scale(1.02); 
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}


#output {
    margin-top: 20px;
    font-weight: normal; /* Bold hata do, text clean dikhega */
    color: #333;
    text-align: left; /* Bullet points ke liye zaruri hai */
    animation: fadeIn 0.5s ease-in-out;
}

#output ul {
    padding-left: 25px; /* Points thode right shift ho jayenge */
    margin-top: 10px;
}
#output li {
    margin-bottom: 8px; /* Har line ke beech gap */
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 AI Career Navigator</h1>
    <p>Find your perfect career path</p>

    <select id="interest">
        <option value="tech">💻 Tech</option>
        <option value="creative">🎨 Creative</option>
        <option value="business">📊 Business</option>
    </select>

    <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
    </select>

    <select id="goal">
        <option value="job">Job</option>
        <option value="freelance">Freelance</option>
    </select>

    <button onclick="getCareerPath()">Get Career Path</button>

    <div id="output" style="margin-top: 20px; padding: 15px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; min-height: 50px;">
    Your career path will appear here...
</div>

<script>
async function getCareerPath() {
    const interest = document.getElementById('interest').value;
    const level = document.getElementById('level').value;
    const output = document.getElementById('output');

    if (!interest) {
        alert("Please enter a career interest!");
        return;
    }

    output.innerHTML = "AI is generating your roadmap... Please wait.";

    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
                "x-api-key": apiKey, // Aapki key yahan hogi
                "anthropic-version": "2023-06-01",
                "content-type": "application/json",
                "dangerously-allow-browser": "true"
            },
            body: JSON.stringify({
                model: "claude-3-haiku-20240307",
                max_tokens: 1000,
                messages: [
                    {
                        role: "user",
                        content: `User wants a career in ${interest} at a ${level} level. Give a 4-week roadmap in HTML format.`
                    }
                ]
            })
        });

        const data = await response.json();
        output.innerHTML = data.content[0].text;

    } catch (error) {
        // AGAR API FAIL HOTI HAI (CORS Error), TOH YE CHALEGA
        console.log("Using Fallback Roadmap due to CORS/Credits issue");
        
        output.innerHTML = `
            <div style="border-left: 4px solid #8b5cf6; padding-left: 15px;">
                <h3 style="color: #8b5cf6;">🚀 30-Day Roadmap for ${interest} (${level})</h3>
                <p><i>Note: Showing optimized path from local knowledge engine.</i></p>
                <ul>
                    <li><b>Week 1: Fundamentals</b> - Master the core concepts of ${interest}. Setup environment.</li>
                    <li><b>Week 2: Deep Dive</b> - Build 2 small projects and understand ${level} level architecture.</li>
                    <li><b>Week 3: Advanced Tools</b> - Learn industry-standard libraries and optimization.</li>
                    <li><b>Week 4: Portfolio & Networking</b> - Deploy your projects and reach out to mentors.</li>
                </ul>
                <p style="font-size: 0.9em; color: #94a3b8;">⚠️ API live connection is restricted by browser CORS policy. For full AI experience, run on a live server.</p>
            </div>
        `;
    }
}

</script>

</body>
</html>
